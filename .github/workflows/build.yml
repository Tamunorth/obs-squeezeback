name: Build OBS Squeezeback Plugin

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  windows:
    name: Windows x64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install OBS Studio
        shell: pwsh
        run: |
          choco install obs-studio -y --no-progress
          # Verify OBS installed and registry entry exists
          $obsDir = (Get-ItemProperty -Path "HKLM:\SOFTWARE\OBS Studio" -ErrorAction SilentlyContinue).'(default)'
          if (-not $obsDir) {
            # Fallback: check common path
            $obsDir = "C:\Program Files\obs-studio"
          }
          Write-Host "OBS installed at: $obsDir"
          if (-not (Test-Path "$obsDir\bin\64bit\obs.dll")) {
            Write-Error "obs.dll not found at $obsDir\bin\64bit\"
            exit 1
          }
          echo "OBS_DIR=$obsDir" >> $env:GITHUB_ENV

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure
        shell: pwsh
        run: |
          cmake -S . -B build -G "Visual Studio 17 2022" -A x64 `
            -DOBS_DIR="$env:OBS_DIR" -Wno-dev

      - name: Build
        run: cmake --build build --config Release

      - name: Verify DLL
        shell: pwsh
        run: |
          if (-not (Test-Path "build\Release\obs-squeezeback.dll")) {
            Write-Error "DLL not found after build"
            exit 1
          }
          Write-Host "DLL built: $(Get-Item build\Release\obs-squeezeback.dll | Select-Object -ExpandProperty Length) bytes"

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          # Add to PATH
          $isccPath = "C:\Program Files (x86)\Inno Setup 6"
          if (-not (Test-Path "$isccPath\ISCC.exe")) {
            $isccPath = "C:\Program Files\Inno Setup 6"
          }
          echo "$isccPath" >> $env:GITHUB_PATH

      - name: Create installer
        shell: pwsh
        run: |
          if (-not (Test-Path "dist")) { New-Item -ItemType Directory -Path "dist" }
          ISCC.exe installer.iss
          if (-not (Test-Path "dist\obs-squeezeback-1.0.0-setup.exe")) {
            Write-Error "Installer not created"
            exit 1
          }
          Write-Host "Installer created: $(Get-Item dist\obs-squeezeback-1.0.0-setup.exe | Select-Object -ExpandProperty Length) bytes"

      - uses: actions/upload-artifact@v4
        with:
          name: obs-squeezeback-windows-installer
          path: dist/obs-squeezeback-1.0.0-setup.exe

  release:
    name: Upload to Release
    needs: [windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: obs-squeezeback-windows-installer
          path: artifacts

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/obs-squeezeback-1.0.0-setup.exe

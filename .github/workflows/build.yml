name: Build OBS Squeezeback Plugin

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  windows:
    name: Windows x64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install OBS Studio
        run: |
          choco install obs-studio -y
          echo "OBS installed"

      - name: Download OBS SDK
        run: |
          curl -L -o obs-sdk.zip https://github.com/obsproject/obs-studio/releases/latest/download/OBS-Studio-Windows-SDK.zip
          7z x obs-sdk.zip -o"obs-sdk"

      - name: Configure
        run: |
          cmake -S . -B build -G "Visual Studio 17 2022" -A x64 `
            -DBUILD_OUT_OF_TREE=ON `
            -DCMAKE_PREFIX_PATH="${{ github.workspace }}/obs-sdk"

      - name: Build
        run: cmake --build build --config Release

      - name: Package
        run: |
          mkdir -p release/obs-plugins/64bit
          mkdir -p release/data/obs-plugins/obs-squeezeback
          cp build/Release/obs-squeezeback.dll release/obs-plugins/64bit/
          cp -r data/* release/data/obs-plugins/obs-squeezeback/

      - uses: actions/upload-artifact@v4
        with:
          name: obs-squeezeback-windows-x64
          path: release/

  linux:
    name: Linux x86_64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake build-essential \
            libobs-dev obs-studio

      - name: Configure
        run: cmake -S . -B build -DBUILD_OUT_OF_TREE=ON

      - name: Build
        run: cmake --build build

      - name: Package
        run: |
          mkdir -p release/lib/obs-plugins
          mkdir -p release/share/obs/obs-plugins/obs-squeezeback
          cp build/obs-squeezeback.so release/lib/obs-plugins/
          cp -r data/* release/share/obs/obs-plugins/obs-squeezeback/

      - uses: actions/upload-artifact@v4
        with:
          name: obs-squeezeback-linux-x86_64
          path: release/

  macos:
    name: macOS Universal
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install OBS
        run: brew install obs-studio

      - name: Configure
        run: |
          cmake -S . -B build \
            -DBUILD_OUT_OF_TREE=ON \
            -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64"

      - name: Build
        run: cmake --build build --config Release

      - name: Package
        run: |
          mkdir -p release/obs-squeezeback.plugin/Contents/MacOS
          mkdir -p release/obs-squeezeback.plugin/Contents/Resources
          cp build/obs-squeezeback.dylib release/obs-squeezeback.plugin/Contents/MacOS/
          cp -r data/* release/obs-squeezeback.plugin/Contents/Resources/

      - uses: actions/upload-artifact@v4
        with:
          name: obs-squeezeback-macos-universal
          path: release/

  release:
    name: Create Release
    needs: [windows, linux, macos]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package archives
        run: |
          cd artifacts
          for dir in */; do
            name="${dir%/}"
            zip -r "../${name}.zip" "$dir"
          done

      - uses: softprops/action-gh-release@v2
        with:
          files: '*.zip'
          generate_release_notes: true

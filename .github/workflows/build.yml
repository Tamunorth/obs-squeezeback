name: Build OBS Squeezeback Plugin

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  windows:
    name: Windows x64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install OBS Studio
        shell: pwsh
        run: |
          choco install obs-studio -y --no-progress
          $obsDir = (Get-ItemProperty -Path "HKLM:\SOFTWARE\OBS Studio" -ErrorAction SilentlyContinue).'(default)'
          if (-not $obsDir) { $obsDir = "C:\Program Files\obs-studio" }
          if (-not (Test-Path "$obsDir\bin\64bit\obs.dll")) {
            Write-Error "obs.dll not found at $obsDir\bin\64bit\"
            exit 1
          }
          Write-Host "OBS installed at: $obsDir"
          echo "OBS_DIR=$obsDir" >> $env:GITHUB_ENV

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.0'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'
          modules: 'qtwidgets'

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Generate import libraries
        shell: cmd
        run: |
          mkdir build\obs-lib

          echo --- Generating obs.lib ---
          dumpbin /exports "%OBS_DIR%\bin\64bit\obs.dll" > build\obs-lib\obs_exports_raw.txt
          echo LIBRARY obs > build\obs-lib\obs.def
          echo EXPORTS >> build\obs-lib\obs.def
          for /f "tokens=1,2,3,4" %%A in ('findstr /r "^[ ][ ]*[0-9]" build\obs-lib\obs_exports_raw.txt') do (
            if not "%%D"=="" echo     %%D >> build\obs-lib\obs.def
          )
          lib /def:build\obs-lib\obs.def /out:build\obs-lib\obs.lib /machine:x64
          if not exist build\obs-lib\obs.lib (
            echo ERROR: Failed to create obs.lib
            exit /b 1
          )
          echo obs.lib created successfully.

          echo --- Generating obs-frontend-api.lib ---
          dumpbin /exports "%OBS_DIR%\bin\64bit\obs-frontend-api.dll" > build\obs-lib\frontend_exports_raw.txt
          echo LIBRARY obs-frontend-api > build\obs-lib\obs-frontend-api.def
          echo EXPORTS >> build\obs-lib\obs-frontend-api.def
          for /f "tokens=1,2,3,4" %%A in ('findstr /r "^[ ][ ]*[0-9]" build\obs-lib\frontend_exports_raw.txt') do (
            if not "%%D"=="" echo     %%D >> build\obs-lib\obs-frontend-api.def
          )
          lib /def:build\obs-lib\obs-frontend-api.def /out:build\obs-lib\obs-frontend-api.lib /machine:x64
          if not exist build\obs-lib\obs-frontend-api.lib (
            echo ERROR: Failed to create obs-frontend-api.lib
            exit /b 1
          )
          echo obs-frontend-api.lib created successfully.

      - name: Configure
        shell: pwsh
        run: |
          cmake -S . -B build -G "Visual Studio 17 2022" -A x64 `
            -DOBS_DIR="$env:OBS_DIR" `
            -DCMAKE_PREFIX_PATH="$env:Qt6_DIR" `
            -Wno-dev

      - name: Build
        run: cmake --build build --config Release

      - name: Verify DLL
        shell: pwsh
        run: |
          if (-not (Test-Path "build\Release\obs-squeezeback.dll")) {
            Write-Error "DLL not found after build"
            exit 1
          }
          $size = (Get-Item build\Release\obs-squeezeback.dll).Length
          Write-Host "DLL built: $size bytes"

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          $isccPath = "C:\Program Files (x86)\Inno Setup 6"
          if (-not (Test-Path "$isccPath\ISCC.exe")) {
            $isccPath = "C:\Program Files\Inno Setup 6"
          }
          echo "$isccPath" >> $env:GITHUB_PATH

      - name: Create installer
        shell: pwsh
        run: |
          if (-not (Test-Path "dist")) { New-Item -ItemType Directory -Path "dist" }
          ISCC.exe installer.iss
          if (-not (Test-Path "dist\obs-squeezeback-1.0.0-setup.exe")) {
            Write-Error "Installer not created"
            exit 1
          }
          $size = (Get-Item dist\obs-squeezeback-1.0.0-setup.exe).Length
          Write-Host "Installer created: $size bytes"

      - uses: actions/upload-artifact@v4
        with:
          name: obs-squeezeback-windows-installer
          path: dist/obs-squeezeback-1.0.0-setup.exe

  release:
    name: Upload to Release
    needs: [windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: obs-squeezeback-windows-installer
          path: artifacts

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/obs-squeezeback-1.0.0-setup.exe
